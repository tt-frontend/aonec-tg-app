<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
    />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icon.svg" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%BASE_URL%apple-touch-icon.png"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="application-name" content="Мои работы" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Мои работы" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <meta name="background-color" content="#000000" />
    <style>
      #app-startup-splash {
        display: none;
      }

      html[data-standalone="true"] #app-startup-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9f9f9;
        opacity: 1;
        transition: opacity 180ms ease;
        pointer-events: none;
      }

      #app-startup-splash__content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      html[data-standalone="true"] #app-startup-splash.is-hidden {
        opacity: 0;
      }

      #app-startup-splash img {
        width: min(144px, 32vw);
        height: min(144px, 32vw);
        object-fit: contain;
      }

      #app-startup-splash__title {
        color: #000000;
        font-family: "Jura", sans-serif;
        font-size: 24px;
        font-weight: 700;
        line-height: 1;
      }
    </style>
    <script>
      (function () {
        var isStandalone =
          window.matchMedia("(display-mode: standalone)").matches ||
          window.navigator.standalone === true;

        document.documentElement.dataset.standalone = isStandalone
          ? "true"
          : "false";
      })();
    </script>
    <title>Мои работы</title>
  </head>
  <body>
    <div id="app-startup-splash" aria-hidden="true">
      <div id="app-startup-splash__content">
        <img src="%BASE_URL%icon.svg" alt="" />
        <div id="app-startup-splash__title">Мои работы</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
